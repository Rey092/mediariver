name: audio-pipeline
description: "Normalize audio (2-pass loudnorm), embed cover art, multi-bitrate HLS (128k/256k)"

connections:
  local:
    type: local
  output:
    type: s3
    bucket: "{{env.S3_BUCKET}}"
    prefix: hls-output/audio/

watch:
  connection: local
  path: /media/incoming/audio
  extensions: [.mp3, .flac, .wav, .m4a, .ogg, .opus]
  poll_interval: 30s

flow:
  - id: probe
    action: audio.info
    input: "{{file.path}}"

  - id: normalize
    action: audio.normalize
    input: "{{file.path}}"
    params:
      target_i: -16
      target_tp: -1.5
      target_lra: 11
      linear: true
      output_codec: aac
      output_bitrate: 256k

  - id: duration_check
    action: audio.duration_check
    params:
      original: "{{file.path}}"
      processed: "{{steps.normalize.output}}"
      tolerance_ms: 500
      on_mismatch: warn

  - id: hls
    action: audio.hls
    input: "{{steps.normalize.output}}"
    params:
      variants:
        - { bitrate: 128k }
        - { bitrate: 256k }
      segment_time: 10

  - id: upload
    action: copy
    params:
      from: "{{steps.hls.output_dir}}"
      to: "output://{{file.stem}}/"

  - id: notify
    action: http.post
    params:
      url: "{{env.BACKEND_URL}}/api/internal/media/audio/{{file.stem}}/ready"
      body:
        hls_path: "{{file.stem}}/master.m3u8"
        duration: "{{steps.probe.duration}}"
