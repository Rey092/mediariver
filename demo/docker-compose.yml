services:
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/demo-bucket;
      echo 'Bucket ready';
      "

  mediariver:
    build:
      context: ..
      dockerfile: Dockerfile
      target: gpu
    depends_on:
      minio-init:
        condition: service_completed_successfully
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, video]
    environment:
      S3_BUCKET: demo-bucket
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      BACKEND_URL: http://localhost:8080
      MEDIA_VIDEO_DIR: /incoming/video
      MEDIA_AUDIO_DIR: /incoming/audio
      MEDIA_IMAGE_DIR: /incoming/manga
    volumes:
      - ./workflows:/workflows:ro
      - ./incoming:/incoming:ro
      - mediariver-data:/data
      - mediariver-work:/work
    command: ["run", "--workflows-dir", "/workflows", "demo-video", "--log-level", "info", "--database-url", "sqlite:////data/state.db"]

volumes:
  mediariver-data:
  mediariver-work:
