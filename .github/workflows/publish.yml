name: Publish

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}

  docker-cpu:
    name: Push Docker (CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          push: true
          context: .
          target: base
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mediariver:${{ inputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/mediariver:latest
          cache-from: type=gha,scope=cpu
          cache-to: type=gha,mode=max,scope=cpu

  docker-gpu:
    name: Push Docker (GPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          push: true
          context: .
          target: gpu
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mediariver:${{ inputs.version }}-gpu
            ${{ secrets.DOCKERHUB_USERNAME }}/mediariver:gpu
          cache-from: type=gha,scope=gpu
          cache-to: type=gha,mode=max,scope=gpu
