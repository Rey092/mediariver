name: video-pipeline
description: "Crop 4:3->16:9, normalize audio, multi-bitrate HLS with free/premium playlists"

connections:
  local:
    type: local
  output:
    type: s3
    bucket: "{{env.S3_BUCKET}}"
    prefix: hls-output/video/

watch:
  connection: local
  path: /media/incoming/video
  extensions: [.mp4, .mkv, .mov, .avi, .webm]
  poll_interval: 30s

flow:
  - id: probe
    action: video.info
    input: "{{file.path}}"

  - id: crop
    action: video.crop
    input: "{{file.path}}"
    params:
      mode: ratio
      ratio: "16:9"
      codec: libx264
      crf: 16
      preset: fast

  - id: normalize
    action: video.normalize_audio
    input: "{{steps.crop.output}}"
    params:
      target_i: -16
      target_tp: -1.5
      target_lra: 11

  - id: process
    action: video.transcode
    input: "{{steps.crop.output}}"
    params:
      preset: h264-web
      crf: 18
      scale: "1920:1080"
      scale_flags: lanczos
      audio_input: "{{steps.normalize.output}}"
      audio_codec: aac
      audio_bitrate: 192k

  - id: hls
    action: video.hls
    input: "{{steps.process.output}}"
    params:
      variants:
        - { height: 360, video_bitrate: 600k, audio_bitrate: 96k }
        - { height: 480, video_bitrate: 1000k, audio_bitrate: 128k }
        - { height: 720, video_bitrate: 2500k, audio_bitrate: 192k }
        - { height: 1080, video_bitrate: 5000k, audio_bitrate: 256k }
      segment_time: 6
      tier_playlists:
        premium: [360, 480, 720, 1080]
        free: [360, 480, 720]

  - id: thumbnail
    action: video.thumbnail
    input: "{{steps.process.output}}"
    params:
      mode: sprite
      grid: "5x5"
      width: 320

  - id: upload
    action: copy
    params:
      from: "{{steps.hls.output_dir}}"
      to: "output://{{file.stem}}/"

  - id: notify
    action: http.post
    params:
      url: "{{env.BACKEND_URL}}/api/internal/media/video/{{file.stem}}/ready"
      body:
        hls_path: "{{file.stem}}/master.m3u8"
        free_path: "{{file.stem}}/free.m3u8"
        duration: "{{steps.probe.duration}}"
